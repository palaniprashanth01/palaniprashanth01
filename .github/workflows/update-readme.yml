name: Update README with pinned repos

on:
  schedule:
    # Refresh pinned repos every 6 hours, on the hour
    - cron: '0 */6 * * *'
  workflow_dispatch:        # lets you trigger it manually from the Actions tab
  push:
    branches: [main, master]
    paths:
      - '.github/workflows/update-readme.yml'
      - 'scripts/update_readme.py'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install requests

      - name: Update README
        env:
          GH_USERNAME: palaniprashanth01
          # GITHUB_TOKEN is auto-provided by Actions — no setup needed
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_readme.py

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: refresh pinned repos [skip ci]"
          git push
